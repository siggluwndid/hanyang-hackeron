<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>로그인</title>

    <link
        rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css"
    >
</head>

<body>
<main class="container" style="max-width:500px; margin-top:100px;">

    <h2>로그인</h2>

    <label>
        아이디
        <input
            type="text"
            id="username"
            placeholder="아이디를 입력하세요"
        >
    </label>

    <label>
        비밀번호
        <input
            type="password"
            id="password"
            placeholder="비밀번호를 입력하세요"
        >
    </label>

    <button id="loginBtn">
        로그인
    </button>

    <p id="message"></p>

</main>

<script>

const loginBtn = document.getElementById("loginBtn");
const message = document.getElementById("message");

loginBtn.addEventListener("click", async () => {

    const username = document.getElementById("username").value.trim();
    const password = document.getElementById("password").value;

    if(username === ""){
        message.textContent = "아이디를 입력해주세요.";
        return;
    }

    if(password === ""){
        message.textContent = "비밀번호를 입력해주세요.";
        return;
    }

    const body = {
        username,
        password
    };

    try{

        const response = await fetch("http://localhost:3000/login",{
            method:"POST",
            headers:{
                "Content-Type":"application/json"
            },
            body:JSON.stringify(body)
        });

        const data = await response.json();

        if(response.ok){
            alert("로그인 성공!");

            console.log(data);

            // 메인 페이지 이동
            // window.location.href = "/main.html";

        }else{
            message.textContent = data.message;
        }

    }catch(err){
        console.error(err);
        message.textContent = "서버와 연결할 수 없습니다.";
    }

});

</script>

</body>
</html>

만약 yejun 브랜치의 Express 서버를 사용한다면 API 경로가 /api/login인지 /users/login인지에 맞게 fetch() 주소만 바꾸면 됩니다. GitHub 저장소 구조에 맞춰 로그인 API(router)까지 연결해서 작성해드릴 수도 있습니다.
