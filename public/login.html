<!DOCTYPE html>
<html lang="ko" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>로그인</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">
  <style>
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #f4f6f9;
    }
    .container {
      max-width: 400px;
      width: 100%;
    }
  </style>
</head>
<body>
  <main class="container">
    <article>
      <header>
        <hgroup>
          <h1>로그인</h1>
          <p>계정 정보를 입력해 주세요</p>
        </hgroup>
      </header>
      
      <!-- 폼 id를 구분하기 쉽게 loginForm으로 변경했습니다 -->
      <form id="loginForm">
        <!-- 백엔드 Schema에 맞춰 id와 name을 username으로 매칭시켰습니다 (이메일 입력 가능) -->
        <label for="username">이메일 (아이디)</label>
        <input type="email" id="username" name="username" placeholder="email@example.com" required="" autocomplete="email">

        <label for="password">비밀번호</label>
        <input type="password" id="password" name="password" placeholder="비밀번호를 입력하세요" required="" autocomplete="current-password">

        <fieldset>
          <label>
            <input type="checkbox" id="remember" name="remember">
            로그인 상태 유지
          </label>
        </fieldset>

        <button type="submit" id="submitBtn">로그인</button>
      </form>
      
      <footer>
        <p style="text-align:center; margin:0;">
          계정이 없으신가요? <a href="#">회원가입</a>
          &nbsp;|&nbsp;
          <a href="#">비밀번호 찾기</a>
        </p>
      </footer>
    </article>

    <div style="text-align:center; margin-top:1rem;">
      <a href="#" onclick="downloadCode(); return false;" role="button" class="outline secondary">소스코드 다운로드</a>
    </div>
  </main>

  <script>
    // 🚀 [백엔드 주소] Render 배포가 완료되면 발급받은 실제 URL 주소로 변경하세요!
    // 테스트 단계에서는 "http://localhost:3000/login" 으로 설정하고 돌려도 됩니다.
    const BACKEND_URL = "https://hanyang-backend.onrender.com/login";

    // 폼 제출(Submit) 이벤트 리스너 등록
    document.getElementById("loginForm").addEventListener("submit", async (event) => {
        // 기본 폼 제출 동작(새로고침)을 막아 무한 로딩 및 튕김을 방지합니다.
        event.preventDefault();

        const usernameInput = document.getElementById("username").value;
        const passwordInput = document.getElementById("password").value;
        const submitBtn = document.getElementById("submitBtn");

        // 더블 클릭으로 인한 중복 요청 방지 및 로딩 표시
        submitBtn.disabled = true;
        submitBtn.innerText = "로그인 중...";

        try {
            // 백엔드로 로그인 요청 전송
            const response = await fetch(BACKEND_URL, {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    username: usernameInput,
                    password: passwordInput
                })
            });

            const data = await response.json();

            if (response.ok && data.success) {
                alert(`${data.user.username}님, 환영합니다!`);
                
                // 🔐 [핵심] 브라우저 저장소 창고에 로그인 데이터 기록
                localStorage.setItem("isLoggedIn", "true");
                localStorage.setItem("username", data.user.username);

                // 로그인 성공 후 메인 화면으로 리다이렉트
                window.location.href = "/index.html"; 
            } else {
                // 백엔드에서 에러를 보낸 경우 (비밀번호 틀림 등)
                alert(`로그인 실패: ${data.message || "정보를 다시 확인해 주세요."}`);
            }
        } catch (error) {
            console.error("통신 오류 발생:", error);
            alert("서버와 통신할 수 없습니다. 백엔드 서버가 켜져 있는지 확인하세요!");
        } finally {
            // 버튼 상태 원상 복구
            submitBtn.disabled = false;
            submitBtn.innerText = "로그인";
        }
    });

    // 소스코드 다운로드 함수 (기존 구조 유지용 더미 함수)
    function downloadCode() {
        alert("소스코드 다운로드를 준비 중입니다.");
    }
  </script>
</body>
</html>
