<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>키오스크 교육</title>

    <!-- Pico CSS v2 최신 버전 -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">
</head>
<body>

<main class="container" style="max-width: 600px; padding-top: 2rem;">

    <h1 style="font-size: 2rem; text-align: center; margin-bottom: 2rem;">
        👵👴 어르신을 위한 키오스크 연습방
    </h1>

    <!-- 노인분들이 누르기 쉽게 버튼을 큼직하게 구성 -->
    <button id="startBtn" style="font-size: 1.5rem; padding: 1.5rem;">
        시작하기 (로그인)
    </button>
    <button id="logout">
        로그아웃
    </button>

</main>

<!-- 로그인 팝업 모달 -->
<dialog id="loginDialog">
    <article style="width: 100%; max-width: 500px;">
        <header>
            <button aria-label="Close" rel="prev" id="closeDialog"></button>
            <strong style="font-size: 1.5rem;">로그인 확인</strong>
        </header>

        <p style="font-size: 1.2rem; margin: 1rem 0;">
            연습을 시작하려면 로그인이 필요합니다.
        </p>

        <footer>
            <button class="secondary" id="cancel" style="font-size: 1.1rem;">
                취소
            </button>
            <button id="loginBtn" style="font-size: 1.1rem;">
                로그인 하러가기
            </button>
        </footer>
    </article>
</dialog>

<script>
const dialog = document.getElementById("loginDialog");
const startBtn = document.getElementById("startBtn");

function handleLogout() {
    // 세션이나 로컬스토리지에 저장된 유저 데이터 싹 날리기
    localStorage.clear(); 
    sessionStorage.clear();

    alert("로그아웃 되었습니다.");

    // 다시 로그인 화면으로 강제 이동
    window.location.href = "/index.html"; 
}

document.getElementById("logout").addEventListener("click", handleLogout);

// 페이지 로드 시 로그인 상태에 따라 메인 버튼 문구 가꿔주기 (심사위원 가산점 포인트)
window.onload = () => {
    const isLoggedIn = localStorage.getItem("isLoggedIn");
    if (isLoggedIn === "true") {
        const username = localStorage.getItem("username") || "어르신";
        startBtn.innerText = `🎈 ${username}님 연습 계속하기`;
    }
};

// 🚀 시작하기 버튼 클릭 시 로그인 여부 체크
startBtn.onclick = () => {
    // 브라우저 창고에서 로그인 여부 팩트 체크
    const isLoggedIn = localStorage.getItem("isLoggedIn");

    if (isLoggedIn === "true") {
        // 🟢 [로그인 완료자] 알라트나 모달 없이 바로 다음 키오스크 단계로 통과!
        window.location.href = "/web.html"; // 실제 이동할 메뉴 파일명으로 바꾸세요.
    } else {
        // ❌ [미로그인자] 기존 모달 팝업을 띄워 로그인 유도
        dialog.showModal();
    }
};

// 모달 닫기 이벤트
document.getElementById("closeDialog").onclick = () => dialog.close();
document.getElementById("cancel").onclick = () => dialog.close();

// 로그인 하러가기 버튼 클릭 시 아까 고친 로그인 전용 페이지로 이동
document.getElementById("loginBtn").onclick = () => {
    dialog.close();
    window.location.href = "/login.html"; // 아까 수정한 로그인 HTML 파일명으로 매칭하세요.
};
</script>

</body>
</html>
