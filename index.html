<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>키오스크</title>

    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">
</head>

<body>

<main class="container">

    <h1> 노인 키오스크 사이트</h1>

    <button id="openLogin">로그인</button>

    <button id="openSignup" class="secondary">
        회원가입
    </button>

</main>


<dialog id="loginDialog">
    <article>

        <header>
            <button
                aria-label="Close"
                rel="prev"
                id="closeLogin">
            </button>

            <strong>로그인</strong>
        </header>

        <label>
            아이디
            <input type="text" placeholder="아이디를 입력하세요">
        </label>

        <label>
            비밀번호
            <input type="password" placeholder="비밀번호를 입력하세요">
        </label>

        <button id="loginBtn">로그인</button>

    </article>
</dialog>

<dialog id="signupDialog">
    <article>

        <header>
            <button
                aria-label="Close"
                rel="prev"
                id="closeSignup">
            </button>

            <strong>회원가입</strong>
        </header>

        <label>
            이름
            <input type="text" placeholder="이름을 입력하세요">
        </label>

        <label>
            아이디
            <input type="text" placeholder="아이디를 입력하세요">
        </label>

        <label>
            비밀번호
            <input type="password" placeholder="비밀번호를 입력하세요">
        </label>

        <button id="signupBtn">가입하기</button>

    </article>
</dialog>

<script>
    const loginDialog = document.getElementById("loginDialog");
    const signupDialog = document.getElementById("signupDialog");

    document.getElementById("openLogin").onclick = () => {
        loginDialog.showModal();
    };

    document.getElementById("closeLogin").onclick = () => {
        loginDialog.close();
    };

    document.getElementById("openSignup").onclick = () => {
        signupDialog.showModal();
    };

    document.getElementById("closeSignup").onclick = () => {
        signupDialog.close();
    };

    document.getElementById("loginBtn").onclick = () => {
        alert("로그인 버튼을 눌렀습니다.");
        loginDialog.close();
    };

    document.getElementById("signupBtn").onclick = () => {
        alert("회원가입이 완료되었습니다.");
        signupDialog.close();
    };
</script>

</body>
</html>
