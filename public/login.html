<!DOCTYPE html>
<html lang="ko" data-theme="light"><head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>로그인</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">
  <style>
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #f4f6f9;
    }
    .container {
      max-width: 400px;
      width: 100%;
    }
  </style>
</head>
<body>
  <main class="container">
    <article>
      <header>
        <hgroup>
          <h1>로그인</h1>
          <p>계정 정보를 입력해 주세요</p>
        </hgroup>
      </header>
      <form id = "d">
        <label for="email">이메일</label>
        <input type="email" id="email" name="email" placeholder="email@example.com" required="" autocomplete="email">

        <label for="password">비밀번호</label>
        <input type="password" id="password" name="password" placeholder="비밀번호를 입력하세요" required="" autocomplete="current-password">

        <fieldset>
          <label>
            <input type="checkbox" id="remember" name="remember">
            로그인 상태 유지
          </label>
        </fieldset>

        <button type="submit">로그인</button>
      </form>
      <footer>
        <p style="text-align:center; margin:0;">
          계정이 없으신가요? <a href="#">회원가입</a>
          &nbsp;|&nbsp;
          <a href="#">비밀번호 찾기</a>
        </p>
      </footer>
    </article>

    <div style="text-align:center; margin-top:1rem;">
      <a href="#" onclick="downloadCode(); return false;" role="button" class="outline secondary">소스코드 다운로드</a>
    </div>
  </main>

  <script>
      
  </script>
  


</body></html>
